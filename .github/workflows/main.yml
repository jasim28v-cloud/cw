name: 🏪 نشر سوق كواغد - Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: 🐍 تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🏗️ توليد ملفات الموقع
        run: |
          python main.py
          echo "✅ تم إنشاء جميع ملفات سوق كواغد بنجاح"

      - name: 📋 تجهيز صفحات GitHub
        uses: actions/configure-pages@v5

      - name: 📤 رفع الملفات
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 نشر الموقع
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🔗 رابط الموقع
        run: |
          echo "========================================="
          echo "🌟 تم نشر سوق كواغد بنجاح!"
          echo "🔗 الرابط: ${{ steps.deployment.outputs.page_url }}"
          echo "========================================="
